name: Android build (ThirdParty)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

concurrency:
  group: android-build-${ github.workflow }-${ github.event_name == 'workflow_dispatch' && github.run_id || github.sha }
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: read
  contents: read

jobs:
  build:
    name: Build Android APK (ThirdParty)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500d0009e67214ff5f5447ce83dd# v6
        with:
          submodules: false

      - name: Setup Java
        uses: actions/setup-java@be666c2fcl27ec809703dec50e508c2fdc7f6654# v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Android APK
        working-directory: apps/android
        run: ./gradlew --no-daemon :app:assembleThirdPartyDebug